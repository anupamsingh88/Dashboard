<div id="attendance">
  <div class="sec-lbl">Attendance Analysis</div>
  <div class="chart-row cr3">
    <div class="cc">
      <div class="cc-hdr">
        <div><div class="cc-title">Daily Attendance — March 2026</div><div class="cc-sub">Members present each working day (sorted chronologically)</div></div>
        <div class="cc-badge">Mar 2026</div>
      </div>
      <div class="chart-wrap" style="height:210px"><canvas id="dailyChart"></canvas></div>
    </div>
    <div class="cc">
      <div class="cc-hdr"><div><div class="cc-title">Status Distribution</div><div class="cc-sub">Team-wide breakdown</div></div></div>
      <div class="chart-wrap" style="height:210px"><canvas id="donutChart"></canvas></div>
    </div>
  </div>
  <div class="chart-row cr2">
    <div class="cc">
      <div class="cc-hdr"><div><div class="cc-title">Member Attendance — Days Present</div><div class="cc-sub">All 35 members, sorted highest to lowest</div></div></div>
      <div class="chart-wrap" style="height:230px"><canvas id="memberAttChart"></canvas></div>
    </div>
    <div class="cc">
      <div class="cc-hdr"><div><div class="cc-title">Leave & Absence Breakdown</div><div class="cc-sub">Members with leaves or absences only</div></div></div>
      <div class="chart-wrap" style="height:230px"><canvas id="leaveChart"></canvas></div>
    </div>
  </div>
</div>
