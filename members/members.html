<div id="members">
  <div class="sec-lbl">Member Roster</div>
  <div class="tbl-card">
    <div class="tbl-hdr">
      <div><div class="cc-title">Full Member Table</div><div class="cc-sub">Click headers to sort · Click a row to view profile</div></div>
      <div style="display:flex; gap: 8px; align-items:center;">
        <button onclick="exportMemberTable()" class="btn-primary" style="font-size:12px; padding:6px 12px">Export CSV</button>
        <div id="tbl-count" class="cc-badge">35 members</div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="memberTable">
        <thead><tr>
          <th onclick="sortTbl('name')">Member</th>
          <th onclick="sortTbl('uid')">User ID</th>
          <th onclick="sortTbl('batch')">Batch</th>
          <th onclick="sortTbl('present')">Present</th>
          <th onclick="sortTbl('absent')">Absent</th>
          <th onclick="sortTbl('leave')">Leave</th>
          <th onclick="sortTbl('weekoff')">Week-Off</th>
          <th onclick="sortTbl('attRate')">Att. Rate</th>
          <th onclick="sortTbl('totalAH')" id="ahColHeader">Total AH</th>
          <th onclick="sortTbl('gams')">GAMS</th>
        </tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </div>
</div>
