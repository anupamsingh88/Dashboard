name: Refresh Dashboard Data

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r execution/requirements.txt

      - name: Run Data Sync
        env:
          EXCEL_URL: ${{ secrets.EXCEL_URL }}
        run: python execution/sync_pipeline.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/data.js shared/version.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update dashboard data [skip ci]" && git push)
